# 配置文件（示例）
# 复制本文件为 config.ini，填入你自己的账号密码。

[account]
# 你的校园网账号（学号）
username = U2023xxxxx
# 你的校园网密码
password = your_password_here

[server]
# 认证服务器（ePortal）。默认值一般无需修改。
host = 192.168.170.168
# 认证服务器使用 https 时设为 true；若浏览器抓包发现是 http，请改为 false。
use_https = false

[network]
# 用于判断"是否已联网"的探针地址。脚本会请求它：
#  - 能正常访问 → 已联网，本次不登录
#  - 被重定向到登录页 → 未登录，触发登录流程
probe_url = http://www.baidu.com
# 登录成功后期望探针返回的标志特征，出现即认为已联网。
# 留空则仅用 HTTP 200 状态码判断。
probe_keyword =

[check]
# 检查间隔（分钟）
interval_minutes = 10
# 每次登录失败后重试次数
max_retries = 3
# 两次重试之间的等待秒数
retry_delay = 5

[service]
# 你的服务类型（运营商）。常见取值：
#   education      教育网（默认校园网，免费）
#   cmcc           中国移动
#   telecom        中国电信
#   unicom         中国联通
# 如不确定，保持 education；登录页下拉框选哪个就填哪个。
service = education

[log]
# 是否在控制台打印日志
verbose = true
