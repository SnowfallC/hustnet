<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HUST 校园网助手</title>
<style>
:root{--blue:#1476ef;--blue-dark:#0964df;--ink:#18335d;--muted:#7c90ae;--line:#d3e2f6;--pale:#f5faff;--white:#fff}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:"Microsoft YaHei","Segoe UI",sans-serif;color:var(--ink);background:var(--white);user-select:none}.app{height:100vh;display:grid;grid-template-columns:minmax(258px,30.4%) 1fr;grid-template-rows:76px minmax(0,1fr);background:#fff}
.brand{display:flex;align-items:center;padding-left:30px;border-bottom:1px solid var(--line);font-size:22px;font-weight:700;letter-spacing:.5px;-webkit-app-region:drag}.drag-strip{position:absolute;top:0;left:30.4%;right:178px;height:76px;z-index:2;-webkit-app-region:drag}.title-actions{position:relative;z-index:3;display:flex;align-items:center;justify-content:flex-end;gap:3px;padding:0 20px;border-bottom:1px solid var(--line);pointer-events:none}.title-actions button{height:42px;min-width:42px;border:0;border-radius:8px;background:transparent;color:#263f66;font:16px "Microsoft YaHei","Segoe UI",sans-serif;cursor:pointer;pointer-events:auto;-webkit-app-region:no-drag}.title-actions button:hover{background:#eff6ff}.title-actions .settings-button{padding:0 12px}.fluent{font-family:"Segoe Fluent Icons";font-size:19px;margin-right:8px}.window-button{font-family:"Segoe Fluent Icons"!important;font-size:13px!important}.window-close:hover{background:#e5484d!important;color:#fff!important}
.sidebar{position:relative;min-height:0;padding:45px 42px 24px;border-right:1px solid var(--line);overflow:hidden;background:linear-gradient(180deg,#f4f9ff 0%,#fff 74%)}.connection-orb{width:184px;height:184px;margin:0 auto 42px;border:2px solid #bfdcff;border-radius:50%;display:grid;place-items:center;text-align:center;box-shadow:0 0 0 9px #edf6ff,inset 0 0 0 12px #f9fcff;position:relative}.connection-orb:before{content:"";position:absolute;inset:15px;border:2px dotted #247cf1;border-radius:50%}.connection-orb:after{content:"";position:absolute;inset:25px;border:4px solid transparent;border-top-color:#1985ed;border-right-color:#16b5d7;border-radius:50%;transform:rotate(-28deg)}.orb-content{position:relative;z-index:1}.wifi-icon{font-family:"Segoe Fluent Icons";font-size:49px;line-height:1;color:var(--blue)}.connection-orb strong{display:block;margin-top:11px;color:var(--blue);font-size:20px}.activity h2{margin:0 0 20px;font-size:17px;font-weight:600}.event-list{max-height:280px;overflow:hidden}.event{position:relative;margin-left:15px;padding:0 0 17px 27px;border-left:2px solid #78b0f7;color:#7b8eaa;font-size:13px;line-height:1.4}.event:last-child{border-left-color:transparent}.event:before{content:"";position:absolute;top:2px;left:-7px;width:10px;height:10px;border:2px solid #75adf5;border-radius:50%;background:#fff}.event.active{color:#1d3761}.event.active:before{background:#1375ed;box-shadow:0 0 0 6px #dcecff}.event time{display:block;margin-bottom:3px;color:#758aa9}.event.active time{color:#0875ee}.campus-art{position:absolute;left:0;right:0;bottom:0;height:115px;opacity:.55;background:linear-gradient(transparent,#f5faff);pointer-events:none}
.main{min-width:0;min-height:0;display:flex;justify-content:center;align-items:flex-start;padding:150px clamp(42px,10vw,106px) 44px;overflow:auto}.login{width:min(100%,458px)}.field{display:block;margin-bottom:27px;font-size:19px;font-weight:500}.input-wrap{height:64px;margin-top:10px;padding:0 18px;display:flex;align-items:center;border:1px solid #bfd2ef;border-radius:11px;background:#fff;box-shadow:0 4px 14px rgba(36,93,174,.05)}.input-wrap:focus-within{border-color:#4e99f7;box-shadow:0 0 0 3px #e8f3ff}.input-icon{font-family:"Segoe Fluent Icons";font-size:21px;color:#8296b5;margin-right:13px}.input-wrap input{min-width:0;flex:1;border:0;outline:0;background:transparent;color:var(--ink);font:17px "Microsoft YaHei","Segoe UI",sans-serif}.eye{border:0;background:transparent;color:#7087aa;font-family:"Segoe Fluent Icons";font-size:19px;cursor:pointer}.primary{width:100%;height:82px;border:0;border-radius:11px;background:var(--blue);color:#fff;font:700 27px "Microsoft YaHei",sans-serif;cursor:pointer;box-shadow:0 9px 22px #c9deff}.primary:hover{background:var(--blue-dark)}.primary:disabled{opacity:.65;cursor:wait}.form-actions{display:flex;align-items:center;justify-content:space-between;margin-top:33px;font-size:16px}.switch{display:flex;align-items:center;gap:12px;cursor:pointer}.switch input{appearance:none;width:45px;height:25px;margin:0;border:0;border-radius:18px;background:#cbd8e9;position:relative;cursor:pointer}.switch input:before{content:"";position:absolute;left:2px;top:2px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 4px #8da1be;transition:.18s}.switch input:checked{background:var(--blue)}.switch input:checked:before{left:22px}.link{border:0;background:none;color:#0872ed;text-decoration:underline;font:16px "Microsoft YaHei",sans-serif;cursor:pointer}.connection-note{margin:16px 0 0;color:#7c8faa;font-size:12px;line-height:1.65}
.settings-layer{position:fixed;inset:0;z-index:10;display:none;place-items:center;background:rgba(18,47,88,.28)}.settings-layer.open{display:grid}.dialog{width:min(460px,calc(100vw - 36px));padding:26px;background:#fff;border:1px solid #d6e4f7;border-radius:15px;box-shadow:0 24px 70px rgba(19,50,94,.24)}.dialog h2{margin:0 0 20px;font-size:20px}.dialog label:not(.switch){display:block;margin:14px 0;color:#405a80;font-size:14px}.dialog input[type=number]{display:block;width:100%;height:42px;margin-top:6px;padding:0 11px;border:1px solid #bdd0ed;border-radius:8px;font-size:15px}.dialog .switch{margin:5px 0 17px}.dialog footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}.dialog footer button{border:0;border-radius:8px;padding:10px 18px;cursor:pointer}.save{background:var(--blue);color:#fff}.toast{position:fixed;z-index:20;bottom:22px;left:50%;transform:translateX(-50%);padding:10px 17px;border-radius:9px;background:#17345e;color:#fff;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}
@media(max-width:720px){.app{grid-template-columns:1fr;grid-template-rows:64px 134px minmax(0,1fr)}.brand{padding-left:18px;font-size:18px}.drag-strip{left:0;right:142px;height:64px}.title-actions{position:absolute;right:0;top:0;height:64px;border:0;padding:0 8px}.title-actions .settings-button{font-size:0;padding:0 7px}.title-actions .settings-button .fluent{margin:0;font-size:19px}.sidebar{grid-row:2;padding:17px 22px;display:flex;align-items:center;gap:26px;border-right:0;border-bottom:1px solid var(--line)}.connection-orb{width:94px;height:94px;flex:none;margin:0;box-shadow:0 0 0 5px #edf6ff,inset 0 0 0 5px #f9fcff}.connection-orb:before{inset:7px}.connection-orb:after{inset:13px;border-width:3px}.wifi-icon{font-size:29px}.connection-orb strong{margin-top:5px;font-size:13px}.activity{min-width:0;flex:1}.activity h2{margin-bottom:9px;font-size:14px}.event-list{height:68px}.event{padding-bottom:8px;font-size:12px}.campus-art{display:none}.main{grid-row:3;padding:31px 24px}.field{margin-bottom:18px;font-size:16px}.input-wrap{height:53px}.primary{height:62px;font-size:22px}.form-actions{margin-top:23px;font-size:14px}.link{font-size:14px}}
.campus-art{height:132px;background:url("assets/hust-main-gate-lineart.png") center bottom/100% auto no-repeat;opacity:.8}.connection-orb:after{display:none}
</style>
</head>
<body>
<div class="app">
  <header class="brand pywebview-drag-region">HUST校园网重连助手</header>
  <div class="drag-strip pywebview-drag-region" aria-hidden="true"></div>
  <div class="title-actions"><button class="settings-button" id="open-settings"><span class="fluent">&#xE713;</span>设置</button><button class="window-button" id="btn-min" title="最小化">&#xE921;</button><button class="window-button window-close" id="btn-close" title="隐藏到托盘">&#xE8BB;</button></div>
  <aside class="sidebar"><div class="connection-orb"><div class="orb-content"><div class="wifi-icon">&#xE701;</div><strong id="state">等待认证</strong></div></div><section class="activity"><h2>最近活动</h2><div class="event-list" id="events"></div></section><div class="campus-art" aria-hidden="true"></div></aside>
  <main class="main"><form class="login" id="login-form"><label class="field">校园网账号<div class="input-wrap"><span class="input-icon">&#xE77B;</span><input id="username" autocomplete="username"></div></label><label class="field">校园网密码<div class="input-wrap"><span class="input-icon">&#xE72E;</span><input id="password" type="password" autocomplete="current-password"><button type="button" class="eye" id="toggle-password" title="显示密码">&#xE890;</button></div></label><button class="primary" id="login-button" type="submit">连接校园网</button><div class="form-actions"><label class="switch"><input id="keepalive" type="checkbox"><span>自动保活</span></label></div><p class="connection-note">连接校园网时，无法验证账号密码是否正确，手动在 <a href="https://myself.hust.edu.cn/" id="self-service-link">myself.hust.edu.cn</a> 断开网络，再尝试登录来验证密码。</p></form></main>
</div>
<div class="settings-layer" id="settings"><div class="dialog"><h2>保活设置</h2><label class="switch"><input id="autostart" type="checkbox"><span>开机自启动</span></label><label>检查间隔（分钟）<input id="interval" type="number" min="1"></label><label>失败重试次数<input id="retries" type="number" min="0"></label><label>重试间隔（秒）<input id="retry-delay" type="number" min="1"></label><footer><button id="close-settings" type="button">取消</button><button class="save" id="save-settings" type="button">保存</button></footer></div></div><div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);let logIdx=0,toastTimer;const call=(method,...args)=>window.pywebview.api[method](...args);
function waitForBridge(){return new Promise(resolve=>{const check=()=>window.pywebview?.api?resolve():setTimeout(check,50);check()})}
function toast(message){$('toast').textContent=message;$('toast').classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2200)}
function renderStatus(status){$('state').textContent=status.online===true?'已连接':status.online===false?'等待认证':'检测中';$('keepalive').checked=!!status.auto_running}
async function loadConfig(){const config=await call('get_config');$('username').value=config.username||'';$('password').value=config.password||'';$('interval').value=config.interval_minutes??10;$('retries').value=config.max_retries??3;$('retry-delay').value=config.retry_delay??5;try{const autorun=await call('get_autorun');$('autostart').checked=!!autorun.enabled}catch{$('autostart').checked=false}}
async function saveConfig(){await call('save_config',{username:$('username').value.trim(),password:$('password').value,interval_minutes:Number($('interval').value)||10,max_retries:Number($('retries').value)||3,retry_delay:Number($('retry-delay').value)||5,verbose:true})}
function addEvent(item){const event=document.createElement('div');event.className=`event ${item.level==='ERROR'?'':'active'}`;const time=document.createElement('time');time.textContent=item.ts;const message=document.createElement('span');message.textContent=item.msg;event.append(time,message);$('events').prepend(event);while($('events').children.length>5)$('events').lastElementChild.remove();logIdx=Math.max(logIdx,item.idx)}
async function pollLogs(){try{const rows=await call('get_logs',logIdx);if(Array.isArray(rows))rows.forEach(addEvent)}catch{}}
$('login-form').addEventListener('submit',async event=>{event.preventDefault();const button=$('login-button');button.disabled=true;await saveConfig();toast('正在连接校园网…');try{const result=await call('check_now');toast(result.ok?'已连接校园网':'连接失败，请查看最近活动');renderStatus(await call('get_status'))}finally{button.disabled=false}});
$('keepalive').addEventListener('change',async event=>{await call(event.target.checked?'start_keepalive':'stop_keepalive');renderStatus(await call('get_status'))});
$('toggle-password').addEventListener('click',()=>{$('password').type=$('password').type==='password'?'text':'password'});
$('self-service-link').addEventListener('click',event=>{event.preventDefault();call('open_self_service')});
$('open-settings').onclick=async()=>{await loadConfig();$('settings').classList.add('open')};$('close-settings').onclick=()=>$('settings').classList.remove('open');$('save-settings').onclick=async()=>{await saveConfig();await call('set_autorun',$('autostart').checked);$('settings').classList.remove('open');toast('设置已保存')};$('btn-min').onclick=()=>call('hide_window');$('btn-close').onclick=()=>call('hide_window');
window.__hustDispatch=(eventName,payload)=>{if(eventName==='status_changed')renderStatus(payload)};
(async()=>{await waitForBridge();await loadConfig();renderStatus(await call('get_status'));pollLogs();setInterval(async()=>renderStatus(await call('get_status')),3000);setInterval(pollLogs,1800)})();
</script>
</body>
</html>
